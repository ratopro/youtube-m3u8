services:
  youtube-hls:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        APP_COMMIT: ${APP_COMMIT:-unknown}
        APP_BUILD_DATE: ${APP_BUILD_DATE:-unknown}
    container_name: youtube-hls
    environment:
      CACHE_TTL_SECONDS: "1800"
      CACHE_MAX_MB: "512"
      CACHE_MAX_OBJECT_MB: "32"
      LIVE_WINDOW_SEGMENTS: "30"
      PRESENTATION_LOOP_COUNT: "1000"
      STATE_FILE: "data/state.json"
      TZ: "Europe/Madrid"
      APP_TZ: "Europe/Madrid"
      FFMPEG_STARTUP_GRACE_SEC: "60"
      PROCESSED_STARTUP_WAIT_SECONDS: "30"
      PROCESSED_DELAY_SECONDS: "15"
      VIDEO_ACCEL: "auto"
      PROCESSED_VIDEO_ENCODER: "libx264"
      PRESENTATION_VIDEO_ENCODER: "libx264"
      PROGRAM_HLS_DIR: "/app/data/program_hls"
      PROGRAM_FALLBACK_VIDEO: "/app/data/fallback.mp4"
    ports:
      - "5058:5000"
    volumes:
      - ./data:/app/data
    restart: "no"
