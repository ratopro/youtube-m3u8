services:
  youtube-hls:
    build: .
    container_name: youtube-hls
    environment:
      CACHE_TTL_SECONDS: "1800"
      CACHE_MAX_MB: "512"
      CACHE_MAX_OBJECT_MB: "32"
      LIVE_WINDOW_SEGMENTS: "30"
      PRESENTATION_LOOP_COUNT: "1000"
      STATE_FILE: "data/state.json"
      TZ: "Europe/Madrid"
      APP_TZ: "Europe/Madrid"
    ports:
      - "5058:5000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
